<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>The Peat - Administration</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0f0f0f;
      --bg-surface: #1a1a1a;
      --gold: #c9a84c;
      --gold-hover: #e8c66a;
      --text-light: #f2ebdd;
      --text-muted: #999;
      --border-color: #333;
      --accent-danger: #e74c3c;
      --accent-info: #3498db;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-dark);
      background-image: radial-gradient(circle at 50% 0%, #2a2a2a 0%, #0f0f0f 70%);
      margin: 0;
      padding: 0;
      color: var(--text-light);
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 40px auto;
      padding: 30px;
      background: rgba(26, 26, 26, 0.7);
      backdrop-filter: blur(15px);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    h1, h2, h3 {
      font-weight: 600;
      margin-top: 0;
    }
    
    h1 {
      font-size: 2rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 30px;
      color: var(--gold);
    }

    h2 {
      font-size: 1.5rem;
      border-bottom: 2px solid var(--border-color);
      padding-bottom: 10px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* ── FORM ELEMENTS ── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      background: rgba(0, 0, 0, 0.3);
      padding: 25px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    label {
      margin-bottom: 8px;
      font-size: 0.9rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="text"], 
    input[type="password"], 
    select {
      width: 100%;
      padding: 12px 15px;
      background: #222;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-light);
      font-family: inherit;
      font-size: 1rem;
      transition: all 0.3s ease;
      box-sizing: border-box;
    }

    input[type="text"]:focus, 
    input[type="password"]:focus, 
    select:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 2px rgba(201, 168, 76, 0.2);
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    /* ── BUTTONS ── */
    button {
      font-family: inherit;
      background: var(--gold);
      color: #000;
      border: none;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    button:hover {
      background: var(--gold-hover);
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(201, 168, 76, 0.3);
    }

    .btn-secondary {
      background: #333;
      color: var(--text-light);
    }
    .btn-secondary:hover {
      background: #444;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }

    .btn-danger {
      background: transparent;
      color: var(--accent-danger);
      border: 1px solid var(--accent-danger);
    }
    .btn-danger:hover {
      background: var(--accent-danger);
      color: #fff;
      box-shadow: 0 5px 15px rgba(231, 76, 60, 0.3);
    }

    .btn-info {
      background: transparent;
      color: var(--accent-info);
      border: 1px solid var(--accent-info);
    }
    .btn-info:hover {
      background: var(--accent-info);
      color: #fff;
      box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
    }

    .btn-small {
      padding: 8px 16px;
      font-size: 0.85rem;
    }

    /* ── TABLES ── */
    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 10px;
      margin-top: 10px;
    }
    
    th {
      text-align: left;
      padding: 0 15px 10px;
      color: var(--text-muted);
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px solid var(--border-color);
    }

    td {
      padding: 15px;
      background: rgba(255, 255, 255, 0.03);
    }

    tr td:first-child { border-top-left-radius: 8px; border-bottom-left-radius: 8px; }
    tr td:last-child { border-top-right-radius: 8px; border-bottom-right-radius: 8px; text-align: right; }

    tr:hover td {
      background: rgba(255, 255, 255, 0.06);
    }

    .product-img {
      width: 60px;
      height: 60px;
      border-radius: 8px;
      object-fit: cover;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    .table-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    /* ── SECTIONS ── */
    #login-section {
      max-width: 400px;
      margin: 15vh auto;
      text-align: center;
    }

    #login-section .form-group {
      text-align: left;
    }

    #login-section button {
      width: 100%;
      margin-top: 15px;
    }

    #dashboard-section {
      display: none;
      animation: fadeIn 0.5s ease-out forwards;
    }

    .logout-btn {
      position: absolute;
      top: 30px;
      right: 30px;
    }

    /* ── TABS ── */
    .tabs-header {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
      border-bottom: 2px solid var(--border-color);
      padding-bottom: 15px;
    }

    .tab-btn {
      background: transparent;
      color: var(--text-muted);
      border: none;
      font-size: 1.1rem;
      padding: 10px 20px;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      border-radius: 0;
      text-transform: none;
    }

    .tab-btn:hover {
      background: transparent;
      color: var(--text-light);
      transform: none;
      box-shadow: none;
    }

    .tab-btn.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
    }

    .tab-content {
      display: none;
      animation: fadeIn 0.4s ease forwards;
    }

    .tab-content.active {
      display: block;
    }

    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div id="login-section" class="container">
  <img src="assets/logo.png" alt="The Peat" style="width: 80px; margin-bottom: 20px;">
  <h1>Administration</h1>
  <div class="form-group">
    <label>Nom d'utilisateur</label>
    <input type="text" id="admin-user" value="admin">
  </div>
  <div class="form-group">
    <label>Mot de passe</label>
    <input type="password" id="admin-pass" value="admin123">
  </div>
  <button onclick="login()">Se Connecter</button>
  <p id="login-error" style="color:var(--accent-danger); margin-top:15px; display:none; font-size: 0.9rem;"></p>
</div>

<div id="dashboard-section" class="container" style="position: relative;">
  <button onclick="logout()" class="btn-secondary btn-small logout-btn">Déconnexion</button>
  
  <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">
    <img src="assets/logo.png" alt="The Peat" style="width: 50px;">
    <h1>Administration</h1>
  </div>

  <div class="tabs-header">
    <button class="tab-btn active" onclick="switchTab('menu', this)">Gestion du Menu</button>
    <button class="tab-btn" onclick="switchTab('clients', this)">Gestion des Clients</button>
  </div>

  <div id="tab-menu" class="tab-content active">
    <h2><span id="form-title">Ajouter un Produit</span></h2>
    <div class="form-grid">
      <div class="form-group"><label>Nom</label><input type="text" id="p-name" placeholder="Ex: Mojito"></div>
      <div class="form-group"><label>Catégorie</label>
        <select id="p-cat">
          <option value="tapas">Tapas</option>
          <option value="cocktails">Cocktails</option>
          <option value="mocktails">Mocktails</option>
          <option value="biere">Bières</option>
          <option value="whisky">Whisky</option>
          <option value="rhum">Rhum</option>
          <option value="gin">Gin</option>
          <option value="vodka">Vodka</option>
          <option value="cognac">Cognac</option>
          <option value="vins">Vins & Champagnes</option>
          <option value="softs">Softs</option>
          <option value="aperitifs">Apéritifs</option>
          <option value="digestifs">Digestifs</option>
        </select>
      </div>
      <div class="form-group"><label>Prix (ex: 4 500 CFA)</label><input type="text" id="p-price" placeholder="Ex: 5000 CFA"></div>
      <div class="form-group">
        <label>Image</label>
        <div class="input-row">
          <input type="text" id="p-img" placeholder="URL ou upload..." style="flex: 1;">
          <input type="file" id="p-file" style="display:none" onchange="uploadImage(this)">
          <button type="button" onclick="document.getElementById('p-file').click()" class="btn-secondary btn-small">Parcourir</button>
        </div>
      </div>
      <div class="form-group"><label>Premium ?</label>
        <select id="p-prem"><option value="0">Standard</option><option value="1">Premium (⭐)</option></select>
      </div>
      <div class="form-group"><label>Description Courte / Sous-catégorie</label><input type="text" id="p-desc" placeholder="Ex: Signature - Ingrédients..."></div>
    </div>
    
    <div style="margin-top: 25px; display: flex; gap: 15px;">
      <button id="btn-save" onclick="saveProduct()">Ajouter à la Carte</button>
      <button id="btn-cancel" onclick="cancelEdit()" class="btn-secondary" style="display:none;">Annuler</button>
    </div>

    <h2 style="margin-top: 60px;">Inventaire</h2>
    <table>
      <thead>
        <tr>
          <th>Aperçu</th>
          <th>Produit</th>
          <th>Catégorie</th>
          <th>Prix</th>
          <th style="text-align: right;">Actions</th>
        </tr>
      </thead>
      <tbody id="products-table"></tbody>
    </table>
  </div> <!-- /tab-menu -->

  <div id="tab-clients" class="tab-content">
    <h2>Liste des Clients Inscrits</h2>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Nom d'utilisateur</th>
          <th>Rôle</th>
        </tr>
      </thead>
      <tbody id="clients-table"></tbody>
    </table>
  </div> <!-- /tab-clients -->

</div>

<script>
  let jwtToken = localStorage.getItem('admin_token');
  let currentEditId = null;
  let allProducts = [];

  async function login() {
    const user = document.getElementById('admin-user').value;
    const pass = document.getElementById('admin-pass').value;
    
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: user, password: pass })
    });
    
    if (res.ok) {
      const data = await res.json();
      if (data.role === 'admin') {
        jwtToken = data.token;
        localStorage.setItem('admin_token', jwtToken);
        showDashboard();
      } else {
        showError("Accès refusé. Réservé aux administrateurs.");
      }
    } else {
      showError("Identifiants incorrects.");
    }
  }
  
  function showError(msg) {
    const el = document.getElementById('login-error');
    el.innerText = msg;
    el.style.display = 'block';
  }

  function logout() {
    localStorage.removeItem('admin_token');
    jwtToken = null;
    document.getElementById('login-section').style.display = 'block';
    document.getElementById('dashboard-section').style.display = 'none';
  }

  async function showDashboard() {
    document.getElementById('login-section').style.display = 'none';
    document.getElementById('dashboard-section').style.display = 'block';
    loadProducts();
    loadUsers();
  }

  function switchTab(tabId, btn) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    
    document.getElementById('tab-' + tabId).classList.add('active');
    btn.classList.add('active');
  }

  async function loadUsers() {
    const res = await fetch('/api/users', {
      headers: { 'Authorization': `Bearer ${jwtToken}` }
    });
    if (res.status === 401) { logout(); return; }
    if (!res.ok) return;

    const users = await res.json();
    const tbody = document.getElementById('clients-table');
    tbody.innerHTML = '';
    
    users.forEach(u => {
      tbody.innerHTML += `
        <tr>
          <td>#${u.id}</td>
          <td><strong>${u.username}</strong></td>
          <td><span style="background: rgba(255,255,255,0.1); padding: 4px 8px; border-radius: 4px; font-size: 12px; text-transform: uppercase;">${u.role}</span></td>
        </tr>
      `;
    });
  }

  async function loadProducts() {
    const res = await fetch('/api/products', {
      headers: { 'Authorization': `Bearer ${jwtToken}` }
    });
    if (res.status === 401) { logout(); return; }
    allProducts = await res.json();
    
    const tbody = document.getElementById('products-table');
    tbody.innerHTML = '';
    
    allProducts.forEach(p => {
      tbody.innerHTML += `
        <tr>
          <td><img src="${p.image_url}" class="product-img"></td>
          <td>
            <strong>${p.name}</strong> 
            ${p.is_premium ? '<span style="color:var(--gold); font-size:12px;">⭐ Premium</span>' : ''}
            <div style="font-size: 12px; color: var(--text-muted); margin-top:4px;">${p.description || ''}</div>
          </td>
          <td><span style="background: rgba(255,255,255,0.1); padding: 4px 8px; border-radius: 4px; font-size: 12px; text-transform: uppercase;">${p.category}</span></td>
          <td style="font-weight: 600;">${p.price}</td>
          <td>
            <div class="table-actions">
              <button onclick="startEdit(${p.id})" class="btn-info btn-small">Modifier</button>
              <button class="btn-danger btn-small" onclick="deleteProduct(${p.id})">Supprimer</button>
            </div>
          </td>
        </tr>
      `;
    });
  }

  async function uploadImage(input) {
    if (!input.files || !input.files[0]) return;
    
    const formData = new FormData();
    formData.append('file', input.files[0]);

    try {
      const res = await fetch('/api/upload', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${jwtToken}` },
        body: formData
      });
      const data = await res.json();
      if (res.ok) {
        document.getElementById('p-img').value = data.url;
      } else {
        alert(data.message || "Erreur d'upload");
      }
    } catch (e) {
      alert("Erreur lors de l'upload");
    }
  }

  function startEdit(id) {
    const p = allProducts.find(x => x.id === id);
    if (!p) return;

    currentEditId = id;
    document.getElementById('p-name').value = p.name;
    document.getElementById('p-cat').value = p.category;
    document.getElementById('p-price').value = p.price;
    document.getElementById('p-img').value = p.image_url;
    document.getElementById('p-prem').value = p.is_premium;
    document.getElementById('p-desc').value = p.description;

    document.getElementById('btn-save').innerText = "Enregistrer les modifications";
    document.getElementById('btn-cancel').style.display = "inline-block";
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function cancelEdit() {
    currentEditId = null;
    document.getElementById('p-name').value = "";
    document.getElementById('p-price').value = "";
    document.getElementById('p-img').value = "assets/";
    document.getElementById('p-desc').value = "";
    document.getElementById('btn-save').innerText = "Ajouter à la Carte";
    document.getElementById('btn-cancel').style.display = "none";
  }

  async function saveProduct() {
    const data = {
      name: document.getElementById('p-name').value,
      category: document.getElementById('p-cat').value,
      price: document.getElementById('p-price').value,
      image_url: document.getElementById('p-img').value,
      is_premium: parseInt(document.getElementById('p-prem').value),
      description: document.getElementById('p-desc').value
    };

    if (!data.name || !data.price) return alert("Nom et prix requis.");

    const url = currentEditId ? `/api/products/${currentEditId}` : '/api/products';
    const method = currentEditId ? 'PUT' : 'POST';

    const res = await fetch(url, {
      method: method,
      headers: { 
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${jwtToken}`
      },
      body: JSON.stringify(data)
    });

    if (res.ok) {
      alert(currentEditId ? "Produit mis à jour !" : "Produit ajouté !");
      cancelEdit();
      loadProducts();
    } else {
      alert("Erreur lors de l'enregistrement.");
    }
  }

  async function deleteProduct(id) {
    if (!confirm("Voulez-vous vraiment supprimer ce produit ?")) return;
    
    const res = await fetch(`/api/products/${id}`, {
      method: 'DELETE',
      headers: { 'Authorization': `Bearer ${jwtToken}` }
    });
    
    if (res.ok) loadProducts();
  }

  if (jwtToken) showDashboard();
</script>

</body>
</html>
