<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>The Peat Le Bar – Menu</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Raleway:wght@300;400;600;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg-dark: #121212;
      --sidebar-bg: #1c1c1c;
      --content-bg: #faf8f5;
      /* Light theme like the reference image */
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --text-dark: #1a1a1a;
      --text-light: #f0ece4;
      --muted: #888;
      --sidebar-w: 80px;
      --curve-radius: 20px;
    }

    /* Responsive Variables */
    @media (min-width: 768px) {
      :root {
        --sidebar-w: 220px;
      }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      background: var(--content-bg);
      font-family: 'Raleway', sans-serif;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── SPLASH ── */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: url('assets/splash_bg.png') center/cover no-repeat;
      background-color: var(--bg-dark);
      /* fallback */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 60px 20px;
      transition: opacity .6s ease, transform .6s ease;
    }

    #splash::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.2) 0%, rgba(0, 0, 0, 0.8) 100%);
      z-index: 1;
    }

    #splash.hide {
      opacity: 0;
      pointer-events: none;
      transform: scale(1.05);
    }

    .splash-content {
      position: relative;
      z-index: 2;
      text-align: center;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .splash-logo {
      animation: fadeUp .8s ease both;
    }

    .splash-logo h1 {
      font-family: 'Playfair Display', serif;
      font-size: 3.2rem;
      letter-spacing: 2px;
      color: var(--text-light);
      line-height: 1.2;
      text-shadow: 0 4px 12px rgba(0, 0, 0, 0.5);
    }

    .splash-logo h1 span {
      color: var(--gold);
      display: block;
      font-size: 4.2rem;
    }

    .splash-logo p {
      font-size: 1.2rem;
      font-weight: 300;
      letter-spacing: 4px;
      color: rgba(255, 255, 255, 0.8);
      margin-top: 15px;
    }

    .slide-btn {
      position: relative;
      z-index: 2;
      margin-top: auto;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      border: none;
      border-radius: 40px;
      padding: 8px 30px 8px 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 20px;
      color: var(--gold);
      font-family: 'Raleway', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      animation: fadeUp .8s .3s ease both;
      transition: transform 0.3s;
      width: 250px;
    }

    .slide-btn:hover {
      transform: translateY(-3px) scale(1.02);
    }

    .arrow-circle {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 10px rgba(201, 168, 76, 0.4);
    }

    .arrow-circle svg {
      width: 22px;
      stroke: #fff;
    }

    /* Splash Footer */
    .splash-foot {
      position: relative;
      z-index: 2;
      margin-top: 30px;
      text-align: center;
      color: #fff;
      animation: fadeUp .8s .5s ease both;
    }

    .splash-foot span {
      font-size: 0.8rem;
      letter-spacing: 2px;
      opacity: 0.7;
      display: block;
      margin-bottom: 12px;
    }

    .social-icons {
      display: flex;
      gap: 16px;
      justify-content: center;
    }

    .social-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #e57373;
      /* matching the image's pinkish red icons */
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      cursor: pointer;
    }

    /* ── MAIN APP ── */
    #app {
      display: flex;
      height: 100dvh;
      opacity: 0;
      transition: opacity .5s .1s ease;
      background: var(--sidebar-bg);
      /* So the rounded content corners show right color */
    }

    #app.show {
      opacity: 1;
    }

    /* ── CURVED SIDEBAR (Mobile to Desktop) ── */
    .sidebar {
      width: var(--sidebar-w);
      background: url('https://www.transparenttextures.com/patterns/black-linen.png'), var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 0;
      gap: 10px;
      overflow-y: auto;
      overflow-x: hidden;
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }

    /* Fix scrollbar for sidebar */
    .sidebar::-webkit-scrollbar {
      display: none;
    }

    .sidebar-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 20px;
      color: #fff;
      width: 100%;
    }

    .sidebar-logo span {
      padding: 4px 12px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
    }

    .nav-item {
      position: relative;
      width: 100%;
      height: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: none;
      background: transparent;
      padding: 0;
      color: #fff;
      transition: 0.3s;
      z-index: 1;
    }

    /* Desktop layout for Nav */
    @media (min-width: 768px) {
      .nav-item {
        flex-direction: row;
        justify-content: flex-start;
        padding-left: 30px;
        gap: 15px;
      }
    }

    .nav-item svg {
      width: 28px;
      height: 28px;
      opacity: 0.6;
      transition: 0.3s;
    }

    .nav-item .nav-label {
      font-size: .65rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 8px;
      opacity: 0.6;
      transition: 0.3s;
    }

    @media (min-width: 768px) {
      .nav-item .nav-label {
        margin-top: 0;
        font-size: .85rem;
      }
    }

    /* ACTVE STATE with the beautiful curve cutout */
    .nav-item.active {
      color: var(--gold);
    }

    .nav-item.active svg {
      opacity: 1;
      stroke: var(--gold);
      fill: var(--gold);
    }

    .nav-item.active .nav-label {
      opacity: 1;
      color: var(--gold);
    }

    .nav-item.active::before {
      content: '';
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: calc(100% - 10px);
      background: var(--content-bg);
      border-radius: var(--curve-radius) 0 0 var(--curve-radius);
      z-index: -1;
    }

    /* These curved corners bridge the gap between active tab and sidebar */
    .nav-item.active .curve-top,
    .nav-item.active .curve-bottom {
      position: absolute;
      right: 0;
      width: var(--curve-radius);
      height: var(--curve-radius);
      background: var(--content-bg);
      z-index: -1;
    }

    .nav-item.active .curve-top {
      top: calc(var(--curve-radius) * -1);
    }

    .nav-item.active .curve-bottom {
      bottom: calc(var(--curve-radius) * -1);
    }

    .nav-item.active .curve-top::after,
    .nav-item.active .curve-bottom::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--sidebar-bg);
      /* must match sidebar bg or be transparent with parent background */
      background-image: url('https://www.transparenttextures.com/patterns/black-linen.png');
    }

    /* creating the inverted curve */
    .nav-item.active .curve-top::after {
      border-bottom-right-radius: var(--curve-radius);
    }

    .nav-item.active .curve-bottom::after {
      border-top-right-radius: var(--curve-radius);
    }


    /* ── CONTENT AREA ── */
    .content-wrapper {
      flex: 1;
      background: var(--content-bg);
      border-radius: var(--curve-radius) 0 0 var(--curve-radius);
      /* Connect to sidebar */
      overflow: hidden;
      position: relative;
      box-shadow: -5px 0 20px rgba(0, 0, 0, 0.1);
      display: flex;
      flex-direction: column;
    }

    /* The actual scrollable content */
    .content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 30px 20px 100px;
      /* spacing for FAB */
      scroll-behavior: smooth;
    }

    /* ── BRAND HEADER IN CONTENT ── */
    .brand-header {
      text-align: center;
      margin-bottom: 30px;
      position: relative;
    }

    .brand-logo-circle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100px;
      height: 100px;
      border: 2px solid var(--text-dark);
      border-radius: 50%;
      margin-bottom: 10px;
      position: relative;
    }

    .brand-logo-circle::after {
      content: '';
      position: absolute;
      inset: 4px;
      border: 1px dotted var(--text-dark);
      border-radius: 50%;
    }

    .brand-logo-circle h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: var(--text-dark);
      z-index: 2;
    }

    .brand-header p {
      font-size: 0.6rem;
      letter-spacing: 3px;
      font-weight: 700;
      color: #444;
    }


    /* ── SECTIONS ── */
    .section {
      display: none;
      animation: fadeIn 0.4s ease;
    }

    .section.active {
      display: block;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .sub-cat {
      margin-bottom: 30px;
    }

    .sub-cat-title {
      font-size: 1.2rem;
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sub-cat-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(0, 0, 0, 0.1);
    }

    /* ── ITEM LIST (Responsive Grid) ── */
    .item-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    @media (min-width: 600px) {
      .item-list {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (min-width: 1024px) {
      .item-list {
        grid-template-columns: 1fr 1fr 1fr;
      }
    }

    .item {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 20px 15px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .item:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
    }

    .item-img {
      width: 120px !important;
      height: 120px !important;
      border-radius: 50%;
      margin-bottom: 15px;
      background: #f0f0f0;
      object-fit: cover;
      display: block;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      position: relative;
      background-color: var(--sidebar-bg);
      /* fallback background */
    }

    /* Fallback gradients if no image */
    .img-cocktail {
      background: radial-gradient(circle, #ffebee, #ffcdd2);
    }

    .img-beer {
      background: radial-gradient(circle, #fff8e1, #ffecb3);
    }

    .img-whisky {
      background: radial-gradient(circle, #efebe9, #d7ccc8);
    }

    .item-name {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 4px;
    }

    .item-sub {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .item-price {
      font-size: 1rem;
      font-weight: 700;
      color: #e57373;
      /* reddish price like image */
      padding-top: 8px;
      border-top: 1px solid #f0f0f0;
      width: 60%;
      margin: 0 auto;
    }

    /* Premium highlight */
    .item.premium {
      background: var(--text-dark);
      color: #fff;
    }

    .item.premium .item-name {
      color: var(--gold);
    }

    .item.premium .item-price {
      color: #fff;
      border-color: rgba(255, 255, 255, 0.1);
    }

    .item.premium .item-sub {
      color: #aaa;
    }


    /* ── FLOATING ACTION BUTTON ── */
    .fab {
      position: absolute;
      bottom: 30px;
      right: 30px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: var(--gold);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 20px rgba(201, 168, 76, 0.5);
      cursor: pointer;
      z-index: 50;
      transition: transform 0.2s;
    }

    .fab:hover {
      transform: scale(1.05);
    }

    .fab svg {
      width: 24px;
      stroke: #fff;
      fill: none;
      stroke-width: 2;
    }


    .footer {
      text-align: center;
      padding: 40px 20px;
      font-size: .7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
    }
    
    /* Auth Modal */
    .auth-modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.8);
      display: none; align-items: center; justify-content: center; z-index: 200;
    }
    .auth-box {
      background: #fff; padding: 30px; border-radius: 12px; width: 90%; max-width: 400px;
      text-align: center;
    }
    .auth-box h2 { font-family: 'Playfair Display', serif; margin-bottom: 20px; color: var(--text-dark); }
    .auth-input {
      width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px;
      box-sizing: border-box; font-family: 'Raleway', sans-serif;
    }
    .auth-btn {
      width: 100%; background: var(--text-dark); color: #fff; border: none; padding: 12px;
      border-radius: 6px; font-weight: bold; cursor: pointer; margin-bottom: 10px;
    }
    .auth-link { color: var(--gold); cursor: pointer; font-size: 0.9rem; text-decoration: underline; }
    
  </style>
</head>

<body>

  <!-- SPLASH -->
  <div id="splash">
    <div class="splash-content">
      <div class="splash-logo">
        <img src="assets/logo.png" alt="The Peat Logo" style="width: 250px; margin-bottom: 20px;">
        <h1>THE PEAT</h1>
        <p>LE BAR & RESTAURANT</p>
      </div>

      <button class="slide-btn" onclick="openMenu()">
        <div class="arrow-circle">
          <svg viewBox="0 0 24 24">
            <path d="M5 12h14M13 6l6 6-6 6" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </div>
        <span>Découvrir le menu</span>
      </button>
    </div>

    <div class="splash-foot">
      <span>NOUS CONTACTER</span>
      <div class="social-icons">
        <div class="social-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2">
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
            <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
          </svg></div>
        <div class="social-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
            <circle cx="12" cy="10" r="3"></circle>
          </svg></div>
        <div class="social-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2">
            <path
              d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z">
            </path>
          </svg></div>
      </div>
    </div>
  </div>

  <div class="auth-modal" id="auth-modal">
    <div class="auth-box">
      <h2 id="auth-title">Connexion Client</h2>
      <input type="text" id="auth-user" class="auth-input" placeholder="Nom d'utilisateur">
      <input type="password" id="auth-pass" class="auth-input" placeholder="Mot de passe">
      <p id="auth-err" style="color:red; font-size: 0.8rem; display:none;"></p>
      <button class="auth-btn" id="auth-submit" onclick="performAuth('login')">Se connecter</button>
      <p class="auth-link" id="auth-switch" onclick="switchAuthMode()">Créer un compte</p>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app">
    <!-- SIDEBAR NAV -->
    <nav class="sidebar">
      <div class="sidebar-logo">
        <img src="assets/logo.png" alt="The Peat" style="width: 50px; margin-bottom: 10px;">
        <span>MORE</span>
      </div>

      <button class="nav-item active" onclick="showSection('cocktails', this)">
        <div class="curve-top"></div>
        <div class="curve-bottom"></div>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
          stroke-width="1.5">
          <path d="M8 2l8 0L12 10l0 8M8 18h8M6 22h12" />
          <path d="M4 2h16" />
        </svg>
        <span class="nav-label">Cocktails</span>
      </button>

      <button class="nav-item" onclick="showSection('mocktails', this)">
        <div class="curve-top"></div>
        <div class="curve-bottom"></div>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
           <path d="M12 2L12 10l-8 8h16l-8-8z" stroke="currentColor"/>
           <path d="M6 22h12" stroke="currentColor"/>
        </svg>
        <span class="nav-label">Mocktails</span>
      </button>

      <button class="nav-item" onclick="showSection('tapas', this)">
        <div class="curve-top"></div>
        <div class="curve-bottom"></div>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="7" cy="7" r="3" />
          <circle cx="17" cy="7" r="3" />
          <circle cx="12" cy="17" r="3" />
        </svg>
        <span class="nav-label">Tapas</span>
      </button>

      <button class="nav-item" onclick="showSection('biere', this)">
        <div class="curve-top"></div>
        <div class="curve-bottom"></div>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
          stroke-width="1.5">
          <path d="M5 4h14l-2 16H7L5 4z" />
          <path d="M19 6h2a1 1 0 011 1v5a1 1 0 01-1 1h-2" />
          <path d="M9 10h6M9 14h4" />
        </svg>
        <span class="nav-label">Bières</span>
      </button>

      <button class="nav-item" onclick="showSection('whisky', this)">
        <div class="curve-top"></div>
        <div class="curve-bottom"></div>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
          stroke-width="1.5">
          <path d="M7 3h10l1 6H6L7 3zM6 9v2a6 6 0 0012 0V9" />
          <path d="M12 21v-4M9 21h6" />
        </svg>
        <span class="nav-label">Whisky</span>
      </button>

      <button class="nav-item" onclick="showSection('spiritueux', this)">
        <div class="curve-top"></div>
        <div class="curve-bottom"></div>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M9 2h6v10H9z" />
          <path d="M12 12v10" />
          <path d="M6 22h12" />
        </svg>
        <span class="nav-label">Spirits</span>
      </button>

      <button class="nav-item" onclick="showSection('vins', this)">
        <div class="curve-top"></div>
        <div class="curve-bottom"></div>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
          stroke-width="1.5">
          <path d="M7 3h10c0 5-2 8-5 9v9M9 21h6" />
          <path d="M7 3c0 3 1 5 5 6" />
        </svg>
        <span class="nav-label">Vins</span>
      </button>

      <button class="nav-item" onclick="showSection('softs', this)">
        <div class="curve-top"></div>
        <div class="curve-bottom"></div>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
          stroke-width="1.5">
          <path d="M8 3h8l1 13H7L8 3z" />
          <path d="M10 3C9 1 15 1 14 3M7 16c0 2.8 2 5 5 5s5-2.2 5-5" />
        </svg>
        <span class="nav-label">Softs</span>
      </button>

      <button class="nav-item" onclick="showSection('extras', this)">
        <div class="curve-top"></div>
        <div class="curve-bottom"></div>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 2l3 6 7 1-5 5 1 7-6-3-6 3 1-7-5-5 7-1z" />
        </svg>
        <span class="nav-label">Extras</span>
      </button>
    </nav>

    <!-- CONTENT -->
    <div class="content-wrapper">
      <div class="content">

        <div class="brand-header">
          <img src="assets/logo.png" alt="The Peat" style="width: 100px; margin-bottom: 15px;">
          <p>PREMIUM DRINKS & MORE</p>
        </div>

        <!-- ── COCKTAILS ── -->
        <div id="cocktails" class="section active"></div>

        <!-- ── MOCKTAILS ── -->
        <div id="mocktails" class="section"></div>

        <!-- ── TAPAS ── -->
        <div id="tapas" class="section"></div>

        <!-- ── BIERES ── -->
        <div id="biere" class="section"></div>

        <!-- ── WHISKY ── -->
        <div id="whisky" class="section"></div>

        <!-- ── SPIRITUEUX (Rhum, Gin, Vodka, Cognac) ── -->
        <div id="spiritueux" class="section"></div>

        <!-- ── VINS ── -->
        <div id="vins" class="section"></div>

        <!-- ── SOFTS ── -->
        <div id="softs" class="section"></div>

        <!-- ── EXTRAS (Aperitifs, Digestifs) ── -->
        <div id="extras" class="section"></div>

        <div class="footer">The Peat Le Bar · Libreville · Gabon</div>
      </div><!-- /content -->

      <div class="fab">
        <svg viewBox="0 0 24 24">
          <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <path d="M16 10a4 4 0 0 1-8 0"></path>
        </svg>
      </div>
    </div><!-- /content-wrapper -->
  </div><!-- /app -->

  <script>
    let currentClientToken = localStorage.getItem('client_token');
    let authMode = 'login';

    function openMenu() {
      if (!currentClientToken) {
        document.getElementById('auth-modal').style.display = 'flex';
      } else {
        launchMenu();
      }
    }

    function launchMenu() {
      document.getElementById('auth-modal').style.display = 'none';
      document.getElementById('splash').classList.add('hide');
      document.getElementById('app').classList.add('show');
      fetchProducts();
    }

    function switchAuthMode() {
      authMode = authMode === 'login' ? 'register' : 'login';
      document.getElementById('auth-title').innerText = authMode === 'login' ? 'Connexion Client' : 'Inscription';
      document.getElementById('auth-submit').innerText = authMode === 'login' ? 'Se connecter' : "S'inscrire";
      document.getElementById('auth-switch').innerText = authMode === 'login' ? 'Créer un compte' : 'Déjà un compte ? Se connecter';
      document.getElementById('auth-submit').setAttribute('onclick', `performAuth('${authMode}')`);
      document.getElementById('auth-err').style.display = 'none';
    }

    async function performAuth(action) {
      const user = document.getElementById('auth-user').value;
      const pass = document.getElementById('auth-pass').value;
      if (!user || !pass) return;

      const res = await fetch('/api/auth/' + action, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({username: user, password: pass})
      });

      const data = await res.json();
      const errEl = document.getElementById('auth-err');
      if (res.ok) {
        if (action === 'register') {
          switchAuthMode();
          errEl.style.color = "green";
          errEl.innerText = "Inscription réussie ! Veuillez vous connecter.";
          errEl.style.display = 'block';
        } else {
          currentClientToken = data.token;
          localStorage.setItem('client_token', data.token);
          launchMenu();
        }
      } else {
        errEl.style.color = "red";
        errEl.innerText = data.message || "Erreur!";
        errEl.style.display = 'block';
      }
    }

    async function fetchProducts() {
      try {
        const res = await fetch('/api/products', {
          headers: { 'Authorization': 'Bearer ' + currentClientToken }
        });
        if (!res.ok) {
            localStorage.removeItem('client_token');
            currentClientToken = null;
            document.getElementById('auth-modal').style.display = 'flex';
            document.getElementById('auth-err').innerText = 'Session expirée.';
            document.getElementById('auth-err').style.color = 'red';
            document.getElementById('auth-err').style.display = 'block';
            return;
        }
        const products = await res.json();
        renderProducts(products);
      } catch (e) {
        console.error("Impossible de charger les produits", e);
      }
    }

    function renderProducts(products) {
      const catMap = {
        'cocktails': document.getElementById('cocktails'),
        'mocktails': document.getElementById('mocktails'),
        'tapas': document.getElementById('tapas'),
        'biere': document.getElementById('biere'),
        'whisky': document.getElementById('whisky'),
        'rhum': document.getElementById('spiritueux'),
        'gin': document.getElementById('spiritueux'),
        'vodka': document.getElementById('spiritueux'),
        'cognac': document.getElementById('spiritueux'),
        'vins': document.getElementById('vins'),
        'softs': document.getElementById('softs'),
        'aperitifs': document.getElementById('extras'),
        'digestifs': document.getElementById('extras')
      };

      for (let c in catMap) {
        if (catMap[c]) catMap[c].innerHTML = ''; 
      }

      // Track sub-categories to create headers only once
      products.forEach(p => {
        let catDiv = catMap[p.category];
        if (!catDiv) return;
        
        let subCatName = "Général";
        let actualDesc = p.description;
        if (p.description && p.description.includes(' - ')) {
          const parts = p.description.split(' - ');
          subCatName = parts[0];
          actualDesc = parts.slice(1).join(' - ');
        } else if (p.description && p.description.length < 30 && !p.description.includes(',')) {
          subCatName = p.description;
          actualDesc = "";
        }

        const subKey = p.category + '_' + subCatName.replace(/\s+/g, '_');
        let itemList = catDiv.querySelector(`.item-list[data-sub="${subKey}"]`);
        
        if (!itemList) {
          const subCatHtml = `
            <div class="sub-cat">
              <div class="sub-cat-title">${subCatName}</div>
              <div class="item-list" data-sub="${subKey}"></div>
            </div>
          `;
          catDiv.insertAdjacentHTML('beforeend', subCatHtml);
          itemList = catDiv.querySelector(`.item-list[data-sub="${subKey}"]`);
        }
        
        let pHtml = `
          <div class="item ${p.is_premium ? 'premium' : ''}" style="animation: fadeIn 0.5s ease-out both;">
            <img class="item-img" src="${p.image_url}" alt="${p.name}">
            <div class="item-name">${p.name}</div>
            ${actualDesc ? `<div class="item-sub">${actualDesc}</div>` : ''}
            <div class="item-price">${p.price}</div>
          </div>
        `;
        itemList.insertAdjacentHTML('beforeend', pHtml);
      });
    }

    function showSection(id, btn) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      btn.classList.add('active');
      document.querySelector('.content').scrollTo({ top: 0, behavior: 'smooth' });
    }
  </script>
</body>

</html>
